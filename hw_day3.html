<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

</head>
<body>
    <form action="#" target="_blank">
        <fieldset>
            <legend>Contact Us</legend>
            
            <!-- Name -->
            <label for="name">Full Name:</label>
            <input type="text" id="name"  name="name" maxlength="20" placeholder="Your name" pattern="[A-Za-z]" ><br>
            <!-- Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="mail_addr" maxlength="20" placeholder="someone@example.com"  required ><br>
            <!-- Phone -->
            <label for="ph">Phone:</label>
            <input type="tel" id="ph" name="Phone" placeholder="+911234567890"><br>
            
            <label for="msg">Issue with recent order</label><br>
             <textarea name="message" id="msg" placeholder="Your query here" maxlength="500"></textarea><br>
             <input type="submit"><br>
             &copy;2026

        </fieldset>

    </form>


</body>
</html>
